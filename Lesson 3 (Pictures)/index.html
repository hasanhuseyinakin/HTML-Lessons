<!DOCTYPE html>

    <meta charset="UTF-8">

</head>
<body>
  <a href="https://youtube.com">
  <img src="img/backgroundd.jpg" width="600px" height="600px" title="Just an image what are you looking for?" alt="Backround">  
  </a>
</body>
</html>
<!-- This lesson showed how to add images. Inside the `<img>` tag, the image location is placed in the `src` section, and the text you want to display when offline is placed below it. This image was the background, and I wrote that. This way, the user will see this text even when offline. The `width` parameter automatically changes the width and height of the image. But if you want to modify the height, you can also edit it with the `height` parameter and place it inside the image. I converted this image into a `like`. For this, you use the classic `a` parameter, but you place the `<img>` parameter inside the `a` parameter. The `title` is exactly what appears when the mouse hovers over the image. What you are currently reading is a comment line :)  -->
